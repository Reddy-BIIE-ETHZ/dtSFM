name: calm
channels:
  - conda-forge
  - pytorch
  - nvidia
dependencies:
  - python=3.11
  - pytorch==2.5.1
  - pytorch-cuda=12.4
  - numpy
  - pandas
  - scikit-learn
  - matplotlib
  - tqdm
  - pyyaml
  - hydra-core
  - sentencepiece
  - transformers=4.56.2
  - wandb
  - rdkit            # SMILES parsing, Morgan fingerprints, Tanimoto, Ro5
  - pip
  - pip:
      - fair-esm        # ESM-2-650M protein backbone
      - huggingface_hub # weight download (SFM-BIIE-ETHZ/dtSFM-v3)
